<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My GitHub Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      color: #333;
      text-align: center;
    }
    header {
      background-color: #24292e;
      color: white;
      padding: 20px 0;
    }
    header h1 {
      margin: 0;
    }
    .container {
      padding: 20px;
    }
    .cta-button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #0366d6;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
    }
    .cta-button:hover {
      background-color: #0056b3;
    }
    footer {
      margin-top: 30px;
      padding: 10px 0;
      background-color: #24292e;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My GitHub Project</h1>
  </header>
  <div class="container">
    <p>Explore my project and learn more about what I’ve been working on!</p>
    <a href="https://github.com/your-username/your-repository" class="cta-button" target="_blank">View on GitHub</a>
  </div>
  <footer>
    <p>&copy; 2025 Eduardo J</p>
  </footer>
</body>
</html>
